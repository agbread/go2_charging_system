aruco_detector_node:
  ros__parameters:
    marker_id: 0
    marker_size: 0.173            # physical side length [m] (A4 출력 기준)
    aruco_dict: DICT_4X4_50
    image_topic: /color/image_raw
    camera_info_topic: /color/camera_info
    publish_debug_image: true

aruco_docking_controller_node:
  ros__parameters:
    target_distance: 0.40         # camera→marker depth [m]; base_link→marker = 0.40 + 0.40 (cam offset) = 0.80 m
    max_linear_x: 0.10            # [m/s]
    max_angular_z: 0.30           # [rad/s]
    Kp_linear: 0.50
    Kp_angular: 1.00
    goal_tol_dist: 0.05           # [m]
    goal_tol_lateral: 0.05        # [m]
    marker_timeout_sec: 0.50
    cmd_vel_topic: /cmd_vel
    marker_pose_topic: /aruco/marker_pose
    sit_on_arrival: true
    joy_topic: /joy
    settle_delay_sec: 1.5
    pre_sit_stop_sec: 1.0          # 정렬 후 B 전에 cmd_vel=0으로 완전 정지 (damp 모드 미끄러짐 방지)
    sit_confirm_timeout_sec: 10.0  # max wait for joint-state sit confirmation (fallback timer)
    charge_check_delay_sec: 2.0     # wait AFTER sit confirmed before reading /charging_state
    charge_detect_timeout_sec: 5.0  # max wait for first /charging_state message
    charge_wait_timeout_sec: 10.0   # 규격서: 약 10초간 충전 상태 유지 확인 (sustain duration)
    max_retries: 2                  # 규격서: 3회 총 시도(초기 1회 + 재시도 2회)
    standup_delay_sec: 14.0        # max wait for GetUp to finish (animation ~10-12s) before forcing loco
    locomotion_trigger_delay_sec: 3.0  # stabilize time AFTER locomotion engages, before backup
    backup_start_delay_sec: 4.0    # (unused by retry now; kept for compatibility)
    backup_speed: 0.10
    backup_max_sec: 10.0           # max backup time if marker never appears [s]
    enable_charging_check: true    # use mock_charging_node to simulate
    # Sit detection via /joint_states
    joint_states_topic: /joint_states
    sit_thigh_target: 1.36         # [rad] b2/go2 sit pose
    sit_calf_target: -2.65         # [rad]
    sit_joint_tolerance: 0.15      # [rad]
    # Stand detection via /joint_states (RETRY_STANDUP waits for this before locomotion)
    stand_calf_target: -1.50       # [rad] calf angle when standing
    stand_calf_tolerance: 0.50     # [rad]
    # Heading alignment before sit (SETTLING phase) — sit collinear with marker normal
    heading_tol: 0.12              # |R[0,2]| threshold (~6.9°) to consider heading parallel
    settle_align_timeout_sec: 5.0  # extra seconds allowed for alignment after settle_delay
    align_yaw_gain: -1.0           # yaw gain on heading_x (flipped: robot was twisting further right with +1.0)
